name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: ruff check .
      - run: pytest --cov=evalpulse --cov-report=term-missing
      - name: Run evaluation quality gate
        run: evalpulse datasets/qa-demo.json --output evalpulse-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evalpulse-report
          path: evalpulse-report.json
